<body style="text-align: center; padding-top: 50px; font-family: Arial; background-color: #f4f4f4;">
    <div style="background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h1 style="color: #333;">انتظر ثواني.. جاري تجهيز القالب</h1>
        <div id="countdown" style="font-size: 60px; color: #e74c3c; font-weight: bold; margin: 20px 0;">10</div>
        <p style="color: #666;">شكراً لثقتك بمتجر القوالب (The Template Hub)</p>

        <a id="download-btn" href="رابط_ميديا_فاير_الحقيقي" style="display: none; padding: 15px 30px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 18px;">اضغط هنا لتحميل الملف الآن</a>
    </div>

    <script>
        var timeleft = 10;
        var downloadTimer = setInterval(function(){
            if(timeleft <= 0){
                clearInterval(downloadTimer);
                document.getElementById("countdown").style.display = "none";
                document.getElementById("download-btn").style.display = "inline-block";
            } else {
                document.getElementById("countdown").innerHTML = timeleft;
            }
            timeleft -= 1;
        }, 1000);
    </script>
