        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .countdown-num { font-size: 38px; font-weight: 900; color: var(--gold); line-height: 1; }
        .countdown-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
        .progress-steps { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .pstep { width: 8px; height: 8px; border-radius: 50%; background: var(--border-soft); transition: all 0.5s; }
        .pstep.active { width: 24px; border-radius: 4px; background: var(--gold); }
        .pstep.done { background: var(--green); }
        .btn-dl {

    <script>
        const TOTAL = 10; let seconds = TOTAL;
        const countEl = document.getElementById('countdown');
        const ringFill = document.getElementById('ring-fill');
        const btn = document.getElementById('download-btn');
        const ringWrap = document.getElementById('ring-wrap');
        const CIRCUMFERENCE = 339.29;
        function updateRing(s) { ringFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - s / TOTAL); }
        updateRing(TOTAL);
        const timer = setInterval(() => {
            seconds--;
            countEl.textContent = seconds;
            updateRing(seconds);
            if (seconds <= 7) { document.getElementById('s1').classList.replace('active','done'); document.getElementById('s2').classList.add('active'); }
            if (seconds <= 3) { document.getElementById('s2').classList.replace('active','done'); document.getElementById('s3').classList.add('active'); }
            if (seconds <= 0) {
                clearInterval(timer);
                ringWrap.style.display = 'none';
                document.getElementById('steps').style.display = 'none';
                btn.style.display = 'flex';
            }
        }, 1000);
    </script>
