    <title>جاري تجهيز القالب - متجر القوالب</title>
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; padding: 50px 20px; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #countdown { font-size: 40px; color: #e74c3c; margin: 20px 0; font-weight: bold; }
        .btn { display: none; padding: 15px 30px; background: #27ae60; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>لحظة من فضلك..</h1>
        <p>يتم الآن تجهيز نموذج المعروض الرسمي.</p>
        
        <div id="countdown">10</div>

        <a id="download-btn" href="https://www.mediafire.com/file/07yxbcujwu26d4e/formal_request.docx/file" class="btn">اضغط هنا للتحميل الآن</a>
        
        <p style="margin-top: 20px; color: #7f8c8d;">شكراً لانتظارك، هذا الوقت يساعدنا في الاستمرار بتقديم الخدمة مجاناً.</p>
    </div>

    <script>
        var seconds = 10;
        var countdown = document.getElementById('countdown');
        var btn = document.getElementById('download-btn');
        var timer = setInterval(function() {
            seconds--;
            countdown.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                countdown.style.display = 'none';
                btn.style.display = 'inline-block';
            }
        }, 1000);
    </script>
</body>
